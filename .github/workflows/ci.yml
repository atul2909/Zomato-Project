name: CI-CD Pipeline

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  APP_PORT: 3000
  IMAGE_NAME: sharmaatulkumar29/zomatoimage
  CONTAINER_NAME: gabr1_app

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Clean Old Build
        run: rm -rf dist || true

      - name: Build Application
        run: npm run build

      #  Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .
          docker build -t $IMAGE_NAME:latest .
          

      #  Login Securely
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      #  Push Image
      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest

      # Checkout the GitOps repo [repo of yaml files which argocd is polling]
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: atul2909/zomato-gitops-repo
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

     # Update image tag in GitOps repo and yaml files which argocd is polling]
      - name: Update image tag in GitOps repo
        run: |
          cd gitops/zomato-files
          IMAGE_TAG=${{ github.sha }}

          sed -i "s|image: $IMAGE_NAME:.*|image: $IMAGE_NAME:${IMAGE_TAG}|g" deployment.yaml

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add deployment.yaml
          git commit -m "Update image to ${IMAGE_TAG}" || echo "No changes to commit"
          git push
